name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile Python
        run: python3 -m py_compile ai tests/test_ai.py tests/static_checks.py
      - name: Check Bash syntax
        run: bash -n install.sh uninstall.sh
      - name: Run static safety and secret checks
        run: python3 tests/static_checks.py
